<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Видеохостинг</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/login.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-video"></i> ВидеоХостинг</h1>
            <p>Войдите в свой аккаунт для доступа к видео</p>
        </div>

        <div class="form-container">
            <div id="message" class="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="login">Логин или Email</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login" name="login" placeholder="Введите логин или email" required autofocus>
                    </div>
                    <div class="error-message" id="loginError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">Войти</span>
                </button>
            </form>

            <div class="form-footer">
                <div class="links">
                    <a href="register.html">Создать аккаунт</a>
                    <a href="index.html">На главную</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/scripts/login.js"></script>
    <script type="module" src="/scripts/config.js"></script>
</body>
</html>
